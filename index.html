<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gym Power</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 10px;
        }
        .login-form {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px var(--shadow-color);
            border: 1px solid var(--border-color-light);
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        .login-form h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input {
            width: 90%;
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color-light);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--shadow-color);
        }
        .login-btn {
            width: 90%;
            padding: 10px 15px;
            background: linear-gradient(135deg, #808080 0%, #999999 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(128, 128, 128, 0.4);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(128, 128, 128, 0.6);
        }
        .login-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(128, 128, 128, 0.3);
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-form {
            animation: fadeIn 1s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form" id="loginForm">
            <img src="images/logo2.png" alt="Gym Power Store Logo" class="login-logo">
            <h2>Login to Gym Power</h2>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            // Allow any non-empty username and password
            if (username && password) {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = 'pages/home.html';
            } else {
                document.getElementById('errorMessage').textContent = 'Please enter both username and password';
            }
        });
    </script>
</body>
</html>
